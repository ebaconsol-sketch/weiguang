<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微光 - 守护每个孩子的心理健康</title>
  <style>
    :root {
      --primary: #5f8f62;
      --primary-dark: #4f7d53;
      --bg-start: #fff9e6;
      --bg-end: #e8f5e9;
      --text: #333333;
      --muted: #68788e;
      --card: rgba(255, 255, 255, 0.86);
      --border: rgba(255, 255, 255, 0.72);
      --danger: #e63946;
      --ok: #1f9d72;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-start) 0%, #f8fbe8 45%, var(--bg-end) 100%);
      padding: 26px 0 40px;
    }

    .container {
      width: min(1140px, 92%);
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      color: #333;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .brand-logo-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #f6e7a1;
      box-shadow: 0 0 0 4px rgba(246, 231, 161, 0.35);
      flex-shrink: 0;
    }

    .title-wrap h1 {
      font-size: 28px;
      letter-spacing: 1px;
      color: #1f4f7e;
      margin-bottom: 4px;
    }

    .title-wrap p {
      color: var(--muted);
      font-size: 14px;
    }

    .export-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, var(--primary), #43b28e);
      box-shadow: 0 8px 20px rgba(47, 111, 165, 0.28);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .export-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(47, 111, 165, 0.34);
    }

    .emergency-alert {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      max-width: 320px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(220, 38, 38, 0.42);
      padding: 14px 16px;
      display: none;
      animation: pulseAlert 1s ease-in-out infinite;
    }

    .emergency-alert.show {
      display: block;
    }

    .emergency-alert strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
      letter-spacing: 0.4px;
    }

    .emergency-alert p {
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.95;
    }

    @keyframes pulseAlert {
      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 12px 28px rgba(220, 38, 38, 0.42);
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 16px 32px rgba(220, 38, 38, 0.55);
      }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 26px rgba(40, 57, 80, 0.1);
      padding: 18px 18px 16px;
    }

    .stat-card h2 {
      font-size: 14px;
      color: #4f6280;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #1f4f7e;
    }

    .stat-card .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .stat-card.danger .value {
      color: var(--danger);
    }

    .stat-card.ok .value {
      color: var(--ok);
    }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(40, 57, 80, 0.1);
      padding: 14px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    thead th {
      text-align: left;
      font-size: 13px;
      color: #2e5a88;
      background: rgba(220, 236, 255, 0.7);
      padding: 12px 14px;
      border-bottom: 1px solid rgba(140, 170, 210, 0.24);
      font-weight: 800;
    }

    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(160, 180, 210, 0.16);
      font-size: 14px;
      color: #344862;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .risk-tag {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    .risk-high {
      background: rgba(230, 57, 70, 0.14);
      color: #c0262d;
    }

    .risk-mid {
      background: rgba(251, 146, 60, 0.18);
      color: #b45309;
    }

    .risk-low {
      background: rgba(16, 185, 129, 0.16);
      color: #0f8a62;
    }

    .report-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #2f6fa5, #2f9f83);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 14px rgba(47, 111, 165, 0.25);
    }

    .report-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(47, 111, 165, 0.33);
    }

    @media print {
      @page {
        size: A4;
        margin: 20mm;
      }

      body {
        background: #fff !important;
      }

      .header,
      .brand-logo,
      .export-btn,
      .emergency-alert,
      .report-btn,
      .bg-shape,
      footer {
        display: none !important;
      }

      .table-wrap,
      .stat-card {
        box-shadow: none !important;
        border: 1px solid #d5ddea !important;
        backdrop-filter: none !important;
      }
    }

    @media (max-width: 880px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <aside class="emergency-alert" id="emergencyAlert" role="alert" aria-live="assertive">
    <strong>紧急预警</strong>
    <p>发现高风险个案，请立即介入。</p>
  </aside>
  <div class="container">
    <div class="brand-logo"><span class="brand-logo-dot" aria-hidden="true"></span><span>微光</span></div>
    <header class="header">
      <div class="title-wrap">
        <h1>微光 AI 老师管理台</h1>
        <p>校园心理测评数据总览 · 本周风险追踪</p>
      </div>
      <button class="export-btn" id="exportWeeklyBtn" type="button">导出本周预警报告</button>
    </header>

    <section class="stats-grid">
      <article class="stat-card">
        <h2>本周总测评人数</h2>
        <div class="value" id="statTotal">0</div>
        <p class="hint" id="statScopeHint">自动读取本地测评记录</p>
      </article>
      <article class="stat-card danger">
        <h2>高风险预警（红色）</h2>
        <div class="value" id="statHighRisk">0</div>
        <p class="hint">建议优先安排跟进</p>
      </article>
      <article class="stat-card ok">
        <h2>平均心理健康指数</h2>
        <div class="value" id="statHealthIndex">0</div>
        <p class="hint">基于风险等级换算</p>
      </article>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>风险等级</th>
            <th>微光 AI 建议关键词</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="warningTableBody"></tbody>
      </table>
    </section>
  </div>
  <script>
    (function () {
      var STORAGE_KEY = "mindplatform_ai_records";
      var currentDisplayRecords = [];

      function escapeHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatTime(iso) {
        var d = new Date(iso);
        if (Number.isNaN(d.getTime())) return "--";
        var p = function (n) {
          return n < 10 ? "0" + n : String(n);
        };
        return (
          d.getFullYear() +
          "-" +
          p(d.getMonth() + 1) +
          "-" +
          p(d.getDate()) +
          " " +
          p(d.getHours()) +
          ":" +
          p(d.getMinutes())
        );
      }

      function isInCurrentWeek(date) {
        var now = new Date();
        var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        var day = today.getDay() || 7;
        var weekStart = new Date(today);
        weekStart.setDate(today.getDate() - day + 1);
        var weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 7);
        return date >= weekStart && date < weekEnd;
      }

      function riskClass(risk) {
        if (risk === "高风险") return "risk-high";
        if (risk === "中风险") return "risk-mid";
        return "risk-low";
      }

      function riskToIndex(risk) {
        if (risk === "高风险") return 45;
        if (risk === "中风险") return 72;
        return 90;
      }

      function openPrintPreview(record) {
        var actions =
          Array.isArray(record.actions) && record.actions.length
            ? record.actions
            : record.suggestionKeywords
            ? String(record.suggestionKeywords).split("、")
            : ["建议尽快与心理老师进行一次面谈。"];
        var html =
          "<!DOCTYPE html><html lang='zh-CN'><head><meta charset='UTF-8'/>" +
          "<title>微光 - 守护每个孩子的心理健康</title>" +
          "<style>" +
          "@page{size:A4;margin:20mm;}" +
          "body{font-family:'SimSun','Songti SC','Times New Roman',serif;background:#fff;color:#1f2937;}" +
          ".paper{max-width:820px;margin:0 auto;} .toolbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:12px;}" +
          ".btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;font-family:Microsoft YaHei,Arial,sans-serif;} .print{background:#2f6fa5;color:#fff;} .close{background:#e2e8f0;color:#334155;}" +
          "h1{font-size:24px;text-align:center;margin-bottom:8px;} .meta{text-align:center;font-size:13px;color:#475569;margin-bottom:14px;}" +
          ".sec{margin-bottom:12px;} .sec h2{font-size:16px;margin-bottom:6px;border-left:4px solid #94a3b8;padding-left:8px;}" +
          ".box{border:1px solid #cbd5e1;padding:10px 12px;line-height:1.8;font-size:14px;min-height:52px;white-space:pre-wrap;}" +
          "table{width:100%;border-collapse:collapse;margin-top:6px;} th,td{border:1px solid #cbd5e1;padding:8px 10px;text-align:left;font-size:13px;}" +
          "th{background:#f8fafc;} ol{margin-left:20px;line-height:1.8;} .sign{display:flex;justify-content:space-between;margin-top:26px;font-size:14px;}" +
          ".line{display:inline-block;min-width:180px;border-bottom:1px solid #334155;vertical-align:middle;height:1.1em;}" +
          "@media print {.toolbar{display:none}}" +
          "</style></head><body><div class='paper'>" +
          "<div class='toolbar'><button class='btn close' onclick='window.close()'>关闭</button><button class='btn print' onclick='window.print()'>下载/打印此报告</button></div>" +
          "<h1>《XX学校学生心理健康个案记录表》</h1><div class='meta' style='margin-bottom:10px;'>微光 · 守护每一个被看见的灵魂</div>" +
          "<div class='meta'>记录时间：" +
          escapeHtml(formatTime(record.time)) +
          " ｜ 风险等级：" +
          escapeHtml(record.riskLevel || "低风险") +
          "</div>" +
          "<section class='sec'><h2>【基本信息】</h2><table><tr><th>记录来源</th><td>微光校园心理平台</td><th>个案编号</th><td>" +
          escapeHtml(String(record.time || "").replace(/[^0-9]/g, "").slice(0, 12) || "—") +
          "</td></tr><tr><th>风险等级</th><td>" +
          escapeHtml(record.riskLevel || "低风险") +
          "</td><th>评估时间</th><td>" +
          escapeHtml(formatTime(record.time)) +
          "</td></tr></table></section>" +
          "<section class='sec'><h2>【学生陈述】</h2><div class='box'>" +
          escapeHtml(record.userInput || "暂无") +
          "</div></section>" +
          "<section class='sec'><h2>【AI 深度评估（含风险指标）】</h2><table><tr><th>焦虑度</th><th>疲劳度</th><th>心理弹性指数</th><th>风险等级</th></tr><tr><td>" +
          escapeHtml(record.anxietyScore ? String(record.anxietyScore) + "%" : "—") +
          "</td><td>" +
          escapeHtml(record.fatigueScore ? String(record.fatigueScore) + "%" : "—") +
          "</td><td>" +
          escapeHtml(record.resilienceScore ? String(record.resilienceScore) + "%" : "—") +
          "</td><td>" +
          escapeHtml(record.riskLevel || "低风险") +
          "</td></tr></table><div class='box' style='margin-top:8px;'>" +
          escapeHtml(record.professionalAnalysis || record.deepEmpathy || record.emotionRecognition || "暂无深度分析文本") +
          "</div></section>" +
          "<section class='sec'><h2>【老师干预建议】</h2><div class='box'><ol>" +
          actions
            .map(function (x) {
              return "<li>" + escapeHtml(x) + "</li>";
            })
            .join("") +
          "</ol></div></section>" +
          "<div class='sign'><div>老师签名：<span class='line'></span></div><div>日期：<span class='line'></span></div></div>" +
          "</div></body></html>";

        var popup = window.open("", "_blank", "width=980,height=780");
        if (!popup) {
          alert("浏览器拦截了弹窗，请允许弹窗后重试。");
          return;
        }
        popup.document.open();
        popup.document.write(html);
        popup.document.close();
      }

      function openWeeklyExport(records) {
        var now = new Date();
        var titleTime =
          now.getFullYear() +
          "-" +
          (now.getMonth() + 1).toString().padStart(2, "0") +
          "-" +
          now.getDate().toString().padStart(2, "0");

        var rows = records
          .map(function (item) {
            return (
              "<tr>" +
              "<td>" +
              escapeHtml(formatTime(item.time)) +
              "</td>" +
              "<td>" +
              escapeHtml(item.riskLevel || "低风险") +
              "</td>" +
              "<td>" +
              escapeHtml(item.userInput || "—") +
              "</td>" +
              "<td>" +
              escapeHtml(item.suggestionKeywords || "—") +
              "</td>" +
              "</tr>"
            );
          })
          .join("");

        var html =
          "<!DOCTYPE html><html lang='zh-CN'><head><meta charset='UTF-8'/>" +
          "<title>微光 - 守护每个孩子的心理健康</title>" +
          "<style>" +
          "body{font-family:Microsoft YaHei,Arial,sans-serif;background:#f4f8ff;padding:24px;color:#1f2937;}" +
          ".paper{max-width:1040px;margin:0 auto;background:#fff;border:1px solid #d8e3f4;border-radius:12px;padding:22px 24px;}" +
          "h1{font-size:24px;color:#1f4f7e;margin-bottom:4px;} .meta{color:#64748b;font-size:13px;margin-bottom:16px;}" +
          ".toolbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:12px;}" +
          ".btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;}" +
          ".btn-print{background:#2f6fa5;color:#fff;} .btn-close{background:#e2e8f0;color:#334155;}" +
          "table{width:100%;border-collapse:collapse;}" +
          "th,td{border:1px solid #dce7f7;padding:10px 12px;text-align:left;vertical-align:top;font-size:13px;line-height:1.6;}" +
          "th{background:#eef5ff;color:#1e3a5f;font-weight:800;}" +
          "tr:nth-child(even) td{background:#fafcff;}" +
          "@media print{body{background:#fff;padding:0}.paper{max-width:none;border:none;border-radius:0;padding:0}.toolbar{display:none}}" +
          "</style></head><body>" +
          "<div class='paper'>" +
          "<div class='toolbar'><button class='btn btn-close' onclick='window.close()'>关闭</button><button class='btn btn-print' onclick='window.print()'>打印/另存 PDF</button></div>" +
          "<h1>本周学生心理预警汇总报告</h1><div class='meta' style='margin-bottom:8px;'>微光 · 守护每一个被看见的灵魂</div>" +
          "<div class='meta'>导出日期：" +
          escapeHtml(titleTime) +
          " ｜ 记录数：" +
          records.length +
          " 条</div>" +
          "<table><thead><tr><th>时间</th><th>风险等级</th><th>学生心情</th><th>微光 AI 建议关键词</th></tr></thead><tbody>" +
          rows +
          "</tbody></table></div></body></html>";

        var popup = window.open("", "_blank", "width=1180,height=820");
        if (!popup) {
          alert("浏览器拦截了弹窗，请允许弹窗后重试。");
          return;
        }
        popup.document.open();
        popup.document.write(html);
        popup.document.close();
      }

      function render() {
        var raw = localStorage.getItem(STORAGE_KEY);
        var records = [];
        try {
          var parsed = raw ? JSON.parse(raw) : [];
          if (Array.isArray(parsed)) records = parsed;
        } catch (e) {
          records = [];
        }

        var emergencyAlert = document.getElementById("emergencyAlert");
        var hasHighRiskRecord = records.some(function (r) {
          return r && r.riskLevel === "高风险";
        });
        if (emergencyAlert) {
          emergencyAlert.classList.toggle("show", hasHighRiskRecord);
        }

        var weekRecords = records.filter(function (item) {
          return item && item.time && isInCurrentWeek(new Date(item.time));
        });
        var displayRecords = weekRecords.length ? weekRecords : records;
        currentDisplayRecords = displayRecords.slice();
        var scopeHint = document.getElementById("statScopeHint");
        if (scopeHint) {
          scopeHint.textContent = weekRecords.length
            ? "当前显示本周记录"
            : records.length
            ? "本周暂无，显示最近全部记录"
            : "自动读取本地测评记录";
        }

        var total = displayRecords.length;
        var highRisk = displayRecords.filter(function (r) {
          return r.riskLevel === "高风险";
        }).length;
        var avgIndex =
          total === 0
            ? 0
            : Math.round(
                displayRecords.reduce(function (sum, item) {
                  return sum + riskToIndex(item.riskLevel);
                }, 0) / total
              );

        document.getElementById("statTotal").textContent = String(total);
        document.getElementById("statHighRisk").textContent = String(highRisk);
        document.getElementById("statHealthIndex").textContent = String(avgIndex);

        var tbody = document.getElementById("warningTableBody");
        if (total === 0) {
          tbody.innerHTML =
            '<tr><td colspan="4" style="text-align:center;color:#718198;">暂无记录。请确认你在同一浏览器并通过 http://localhost:3000 打开首页后再提交分析。</td></tr>';
          return;
        }

        tbody.innerHTML = displayRecords
          .map(function (item, idx) {
            return (
              "<tr>" +
              "<td>" +
              formatTime(item.time) +
              "</td>" +
              '<td><span class="risk-tag ' +
              riskClass(item.riskLevel) +
              '">' +
              (item.riskLevel || "低风险") +
              "</span></td>" +
              "<td>" +
              (item.suggestionKeywords || "—") +
              "</td>" +
              "<td>" +
              '<button class="report-btn" type="button" data-idx="' +
              idx +
              '">下载/打印此报告</button>' +
              "</td>" +
              "</tr>"
            );
          })
          .join("");
      }

      render();
      window.addEventListener("storage", function (e) {
        if (e.key === STORAGE_KEY) render();
      });

      document.getElementById("exportWeeklyBtn").addEventListener("click", function () {
        if (!currentDisplayRecords.length) {
          alert("暂无可导出的记录。请先在首页完成心理测评。");
          return;
        }
        openWeeklyExport(currentDisplayRecords);
      });

      document.getElementById("warningTableBody").addEventListener("click", function (e) {
        var btn = e.target.closest(".report-btn");
        if (!btn) return;
        var idx = Number(btn.getAttribute("data-idx"));
        if (!Number.isInteger(idx) || idx < 0 || idx >= currentDisplayRecords.length) return;
        openPrintPreview(currentDisplayRecords[idx]);
      });
    })();
  </script>
</body>
</html>
